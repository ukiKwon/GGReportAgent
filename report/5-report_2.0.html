<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>서울시 5개 구청 사업제안 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root {
    --ink:#0a0e1a; --dossier:#131a2c; --dossier2:#1a2338; --line:#2b3554;
    --text:#e9edf6; --muted:#8892b0;
    --brass:#c9a55c; --brass-soft:rgba(201,165,92,.14);
    --jade:#4f9d74; --amber:#cf9a3e; --vermilion:#c1453c;
    --grid-line:rgba(255,255,255,.035);
    --bg:var(--ink); --panel:var(--dossier); --panel2:var(--dossier2); --border:var(--line);
    --accent:var(--brass);
    --score-good:var(--jade); --score-mid:var(--amber); --score-bad:var(--vermilion);
    --font-display:'Pretendard Variable','Pretendard',-apple-system,"Malgun Gothic",sans-serif;
    --font-mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --ink:#eef1f7; --dossier:#ffffff; --dossier2:#f3f5fb; --line:#dbe1ee;
      --text:#161d30; --muted:#5b6480;
      --brass:#8a6423; --brass-soft:rgba(138,100,35,.10);
      --jade:#2f7d54; --amber:#a8791f; --vermilion:#a8362d;
      --grid-line:rgba(20,30,60,.05);
    }
  }
  * { box-sizing:border-box; }
  html, body { height:100%; margin:0; }
  body { font-family:var(--font-display); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--line); border-radius:5px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--muted); }
  :focus-visible { outline:2px solid var(--brass); outline-offset:2px; }

  #page-root { display:flex; flex-direction:column; height:100vh; min-height:480px; }
  #masthead { flex-shrink:0; height:64px; display:flex; align-items:center; gap:14px; padding:0 28px; border-bottom:1px solid var(--line); background:var(--dossier); }
  .mh-seal { width:36px; height:36px; border-radius:50%; border:1.5px solid var(--brass); display:flex; align-items:center; justify-content:center; position:relative; color:var(--brass); font-weight:800; font-size:15px; transform:rotate(-8deg); flex-shrink:0; }
  .mh-seal::after { content:''; position:absolute; inset:3px; border:1px dashed var(--brass); border-radius:50%; opacity:.5; }
  .mh-eyebrow { font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); }
  #masthead h1 { margin:2px 0 0; font-size:17px; font-weight:800; letter-spacing:-.01em; }

  #app-shell { display:flex; flex:1; min-height:0; }
  #sidebar { width:172px; background:var(--panel); border-right:1px solid var(--border); padding:18px 0; flex-shrink:0; }
  .nav-item { padding:13px 22px; cursor:pointer; font-size:13px; font-weight:600; color:var(--muted); border-left:2px solid transparent; user-select:none; display:flex; align-items:center; gap:10px; transition: color .15s, background .15s, border-color .15s; }
  .nav-item .ni-icon { font-size:15px; }
  .nav-item:hover { color:var(--text); background:var(--panel2); }
  .nav-item.active { color:var(--text); border-left-color:var(--brass); background:var(--brass-soft); }
  #main-area { flex:1; position:relative; overflow:auto; }
  .tab-panel { display:none; position:absolute; inset:0; }
  .tab-panel.visible { display:block; }

  #tab-dashboard { background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px); background-size:40px 40px; }
  .gu { stroke:var(--bg); stroke-width:2; cursor:pointer; transition: filter .2s, opacity .2s; }
  .gu.placeholder { opacity:.5; }
  .gu.placeholder:hover { opacity:.8; }
  .gu.gu-active:hover { filter:brightness(1.12) drop-shadow(0 2px 6px rgba(0,0,0,.35)); }
  .d-label { fill:var(--text); font-size:12px; font-weight:700; pointer-events:none; font-family:var(--font-display); }
  .d-label-sm { fill:var(--text); font-size:10px; font-weight:600; pointer-events:none; font-family:var(--font-display); opacity:.8; paint-order:stroke; stroke:var(--ink); stroke-width:2.5px; stroke-linejoin:round; }
  .d-seal { stroke-width:1.4; stroke-dasharray:2,2; pointer-events:none; }
  .d-seal-score { font-family:var(--font-mono); font-weight:700; font-size:12px; pointer-events:none; }
  #map-footnote { fill:var(--muted); font-size:11px; font-family:var(--font-mono); }
  .map-footnote { fill:var(--muted); font-size:12px; }

  #map-legend { position:absolute; left:20px; bottom:20px; z-index:10; width:230px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:14px 16px; box-shadow:0 8px 24px rgba(0,0,0,.25); }
  .legend-title { font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:8px; }
  .legend-row { display:flex; align-items:center; gap:8px; font-size:12.5px; padding:3px 0; }
  .legend-swatch { width:11px; height:11px; border-radius:3px; flex-shrink:0; }
  .legend-divider { height:1px; background:var(--border); margin:12px 0; }
  .legend-score { font-size:11.5px; line-height:1.7; color:var(--muted); }

  #map-tooltip { position:fixed; z-index:1200; max-width:280px; background:var(--panel); border:1px solid var(--brass); border-radius:8px; padding:14px 16px; box-shadow:0 10px 30px rgba(0,0,0,.35); opacity:0; pointer-events:none; transition:opacity .12s; }
  #map-tooltip.show { opacity:1; }
  .mt-head { display:flex; align-items:center; gap:10px; }
  .mt-seal { width:38px; height:38px; font-size:13px; }
  .mt-name { font-weight:800; font-size:14.5px; }
  .mt-bank { font-size:11px; margin-top:2px; }
  .mt-budget { font-size:11.5px; color:var(--muted); margin-top:8px; }
  .mt-issue { font-size:12px; line-height:1.5; margin-top:8px; border-top:1px solid var(--border); padding-top:8px; }
  .mt-cta { font-size:10.5px; color:var(--brass); margin-top:8px; font-family:var(--font-mono); }

  #detail-overlay { position:fixed; inset:0; z-index:1000; background:var(--bg); overflow:auto; opacity:0; pointer-events:none; clip-path:circle(0% at var(--ox,50%) var(--oy,50%)); transition: clip-path .6s cubic-bezier(.16,1,.3,1), opacity .35s ease; }
  #detail-overlay.show { opacity:1; pointer-events:auto; clip-path:circle(150% at var(--ox,50%) var(--oy,50%)); }
  @keyframes stampIn { 0%{transform:rotate(-5deg) scale(1.7); opacity:0;} 60%{transform:rotate(-5deg) scale(.92); opacity:1;} 100%{transform:rotate(-5deg) scale(1);} }
  .detail-header { padding:28px 36px 20px; display:flex; align-items:flex-start; justify-content:space-between; gap:20px; border-bottom:1px solid var(--border); background:linear-gradient(180deg, var(--panel), transparent); }
  #detail-title { font-family:var(--font-display); font-weight:800; font-size:38px; letter-spacing:-.01em; margin:0; }
  .detail-meta { display:flex; align-items:flex-start; gap:20px; margin-top:16px; }
  .detail-meta-col { flex:1; min-width:0; }
  .dm-k { display:block; font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
  .dm-v { display:block; font-size:19px; font-weight:700; margin-top:4px; }
  .score-table { width:100%; max-width:420px; border-collapse:collapse; margin-top:14px; font-size:13px; }
  .score-table td { padding:7px 10px; border-bottom:1px solid var(--border); }
  .score-table td:first-child { color:var(--muted); }
  .score-table td:last-child { text-align:right; font-family:var(--font-mono); font-weight:700; white-space:nowrap; }
  .score-table tr:last-child td { border-bottom:none; border-top:2px solid var(--brass); font-size:15px; color:var(--brass); padding-top:10px; }
  .detail-close { background:var(--panel2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:9px 16px; cursor:pointer; font-size:13px; font-family:var(--font-display); flex-shrink:0; }
  .detail-close:hover { border-color:var(--brass); color:var(--brass); }
  .detail-subtabs { display:flex; gap:2px; padding:0 36px; border-bottom:1px solid var(--border); background:var(--panel); }
  .detail-subtab { padding:12px 18px; cursor:pointer; font-size:13px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent; transition:color .15s, border-color .15s; }
  .detail-subtab:hover { color:var(--text); }
  .detail-subtab.active { color:var(--text); border-bottom-color:var(--brass); }
  .detail-body { padding:28px 36px 60px; max-width:1080px; margin:0 auto; }

  .seal-badge { display:inline-flex; flex-direction:column; align-items:center; justify-content:center; width:56px; height:56px; border-radius:50%; border:2px solid currentColor; position:relative; font-family:var(--font-mono); font-weight:700; font-size:18px; flex-shrink:0; transform:rotate(-5deg); }
  .seal-badge::after { content:''; position:absolute; inset:4px; border:1px dashed currentColor; border-radius:50%; opacity:.5; }
  .seal-badge .sb-label { font-family:var(--font-display); font-size:8px; letter-spacing:.06em; opacity:.8; margin-top:-1px; }
  .seal-badge.animate { animation: stampIn .45s cubic-bezier(.2,.8,.3,1.15); }
  .seal-badge.lg { width:76px; height:76px; font-size:26px; }
  .seal-badge.lg .sb-label { font-size:10px; }

  #detail-body summary { cursor:pointer; list-style:none; }
  #detail-body summary::-webkit-details-marker { display:none; }
  #detail-body summary::before { content:'▸'; display:inline-block; margin-right:8px; color:var(--brass); transition:transform .15s ease; font-size:.85em; }
  #detail-body details[open] > summary::before { transform:rotate(90deg); }

  .section-h { font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 12px 0; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .section-h.accent { color:var(--brass); margin-top:28px; }

  .issue-list { display:flex; flex-direction:column; gap:10px; }
  .topic-chip { display:block; background:var(--panel2); border:1px solid var(--border); border-left:4px solid var(--brass); border-radius:5px; padding:16px 18px; font-size:15.5px; line-height:1.55; font-weight:600; }
  .topic-chip summary { font-size:15.5px; line-height:1.55; font-weight:600; }
  .topic-chip strong { color:var(--brass); font-family:var(--font-mono); font-weight:700; }
  .topic-detail { margin-top:12px; padding-top:12px; border-top:1px dashed var(--border); font-size:14px; line-height:1.75; color:var(--muted); font-weight:400; }
  .verdict-note { margin-top:24px; background:var(--panel2); border:1px solid var(--border); border-left:3px solid var(--brass); border-radius:4px; padding:16px 18px; }
  .vn-label { font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--brass); margin-bottom:8px; }
  .verdict-note p { margin:0; font-size:13px; line-height:1.75; opacity:.9; }

  .stat-row { display:flex; gap:14px; margin-bottom:8px; }
  .stat-tile { flex:1; background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:16px; text-align:center; }
  .stat-num { font-family:var(--font-mono); font-size:30px; font-weight:800; }
  .stat-label { font-size:12px; color:var(--muted); margin-top:4px; }
  .stat-caption { font-size:11px; color:var(--muted); margin:8px 0 24px; line-height:1.6; }
  .plan-section-h { font-size:15px; font-weight:800; margin:28px 0 4px; }
  .plan-section-sub { font-size:12px; color:var(--muted); margin-bottom:12px; line-height:1.6; }
  .corr-graph { background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:16px; margin:12px 0; overflow-x:auto; }
  .corr-empty { background:var(--panel2); border:1px dashed var(--border); border-radius:8px; padding:20px; text-align:center; color:var(--muted); font-size:13px; margin:12px 0; }
  .corr-node-label { font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.06em; fill:var(--muted); }
  .corr-table { width:100%; border-collapse:collapse; font-size:12.5px; margin-top:14px; }
  .corr-table th { text-align:left; padding:8px; border-bottom:2px solid var(--border); font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; }
  .corr-table td { padding:8px; border-bottom:1px solid var(--border); vertical-align:top; line-height:1.65; }
  .proposal-banner { background:var(--brass-soft); border:1px solid var(--brass); border-radius:6px; padding:12px 16px; margin-bottom:22px; font-size:12.5px; color:var(--brass); line-height:1.65; }

  .proj-card { background:var(--panel2); border:1px solid var(--border); border-left:3px solid var(--brass); border-radius:4px; padding:14px 16px; margin-bottom:10px; }
  .proj-card .code { font-family:var(--font-mono); font-size:10.5px; letter-spacing:.03em; color:var(--muted); text-transform:uppercase; }
  .proj-card .name { font-weight:700; margin:5px 0; font-size:14px; }
  .proj-card .meta { font-size:12px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .proj-detail { margin-top:12px; padding-top:12px; border-top:1px dashed var(--border); font-size:13.5px; line-height:1.8; color:var(--text); opacity:.9; }

  .pill { display:inline-flex; align-items:center; padding:2px 8px; border-radius:3px; font-size:10.5px; font-weight:700; font-family:var(--font-mono); letter-spacing:.02em; white-space:nowrap; }
  .pill[data-level="최우선"] { background:rgba(193,69,60,.16); color:var(--vermilion); }
  .pill[data-level="상"] { background:rgba(207,154,62,.16); color:var(--amber); }
  .pill[data-level="중상"] { background:rgba(207,154,62,.16); color:var(--amber); }
  .pill[data-level="중"] { background:rgba(79,157,116,.16); color:var(--jade); }
  .pill[data-level="하"] { background:var(--panel2); color:var(--muted); border:1px solid var(--border); }
  .pill[data-level="신규"], .pill[data-level="완전 신규"] { background:var(--brass-soft); color:var(--brass); }
  .pill[data-level="확장"] { background:rgba(79,157,116,.16); color:var(--jade); }
  .pill[data-level="확장/보완"] { background:rgba(207,154,62,.16); color:var(--amber); }

  .vtable { width:100%; border-collapse:collapse; font-size:12.5px; margin-top:18px; }
  .vtable th { text-align:left; padding:10px; border-bottom:2px solid var(--border); font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600; }
  .vtable td { text-align:left; padding:10px; border-bottom:1px solid var(--border); vertical-align:top; line-height:1.6; }
  .vtable td:first-child { font-family:var(--font-mono); font-size:11px; color:var(--muted); white-space:nowrap; }
  .vtable tbody tr:hover { background:var(--panel2); }
  .vtable-sub { font-size:11px; color:var(--muted); margin-top:5px; line-height:1.5; }

  .top3-box { background:var(--brass-soft); border:1px solid var(--brass); border-radius:8px; padding:18px 20px; margin-bottom:24px; }
  .top3-box-label { font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--brass); margin-bottom:14px; }
  .top3-item { display:flex; align-items:baseline; gap:14px; padding:9px 0; font-size:14.5px; font-weight:600; border-bottom:1px dashed rgba(201,165,92,.35); }
  .top3-item:last-child { border-bottom:none; }
  .top3-rank { font-family:var(--font-mono); font-weight:800; font-size:20px; color:var(--brass); min-width:22px; }
  .bank-cat { margin-bottom:20px; }
  .bank-cat h4 { font-size:12.5px; margin:0 0 10px 0; color:var(--brass); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.04em; padding-bottom:6px; border-bottom:1px dashed var(--border); }
  .bank-cat ul { margin:0; padding:0; list-style:none; }
  .bank-cat li { padding:0; }
  .bank-idea { border-bottom:1px solid var(--border); }
  .bank-idea:last-child { border-bottom:none; }
  .bank-idea summary { padding:9px 0; font-size:13px; line-height:1.5; }
  .bank-detail { margin:0 0 12px 20px; padding:10px 12px; background:var(--dossier); border-left:2px solid var(--brass); border-radius:0 4px 4px 0; font-size:12.5px; line-height:1.75; color:var(--muted); }
  .bank-idea.is-top3 { background:var(--brass-soft); border-radius:3px; padding-left:10px; margin-left:-10px; }
  .li-star { color:var(--brass); margin-right:4px; }

  #report-container { padding:28px 36px; }
  #topic-select { background:var(--panel2); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:9px 14px; font-size:13px; font-family:var(--font-display); cursor:pointer; }
  #topic-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-top:20px; }
  .report-col { background:var(--panel2); border:1px solid var(--border); border-radius:6px; padding:14px; font-size:12.5px; }
  .report-col h4 { margin:0 0 10px 0; font-size:13px; font-weight:800; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .report-proj-line { padding:8px 0; border-bottom:1px solid var(--border); line-height:1.55; }
  .report-proj-line:last-child { border-bottom:none; }
  .report-proj-line b { display:block; margin-bottom:2px; }

  @media (prefers-reduced-motion: reduce) {
    .seal-badge.animate { animation:none; }
    .gu, .nav-item, .detail-subtab, #detail-overlay { transition:none; }
  }
  @media (max-width: 640px) {
    #masthead { padding:0 16px; gap:10px; }
    #masthead h1 { font-size:14px; }
    #sidebar { width:56px; }
    .nav-item { padding:14px 8px; font-size:11px; text-align:center; flex-direction:column; gap:4px; }
    #topic-grid { grid-template-columns:repeat(2,1fr); }
    .detail-header, .detail-body, .detail-subtabs, #report-container { padding-left:16px; padding-right:16px; }
    .vtable { font-size:11.5px; }
    #map-legend { display:none; }
  }
</style>
</head>
<body>
<div id="page-root">
  <header id="masthead">
    <div class="mh-seal">印</div>
    <div>
      <div class="mh-eyebrow">KB 제안계획서 검증</div>
      <h1>서울시 구청 사업제안 대시보드</h1>
    </div>
  </header>
  <div id="app-shell">
    <div id="sidebar">
      <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="ni-icon">🗺</span>대시보드</div>
      <div class="nav-item" data-tab="report" onclick="switchTab('report')"><span class="ni-icon">📊</span>리포트</div>
    </div>
    <div id="main-area">
      <div id="tab-dashboard" class="tab-panel visible"></div>
      <div id="tab-report" class="tab-panel"></div>
    </div>
  </div>
</div>
<div id="detail-overlay">
  <div class="detail-header">
    <div>
      <h2 id="detail-title"></h2>
      <div id="detail-subtitle"></div>
    </div>
    <button class="detail-close" onclick="closeDistrictDetail()">← 지도로 돌아가기</button>
  </div>
  <div class="detail-subtabs">
    <div class="detail-subtab active" data-sub="summary" onclick="switchDetailTab('summary')">구청 사업현황 분석</div>
    <div class="detail-subtab" data-sub="it" onclick="switchDetailTab('it')">전산개발 신규 제안</div>
    <div class="detail-subtab" data-sub="fn" onclick="switchDetailTab('fn')">자금지원 신규 제안</div>
    <div class="detail-subtab" data-sub="bank" onclick="switchDetailTab('bank')">금융업 연계 신규 제안</div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>
<script>
const DISTRICTS = {
  "dobong": {
  "name":"도봉구","active":true,"mapCell":"dobong",
  "score":74,
  "budget":"20~30억원 (구 예산 7,919억원 대비 약 0.25~0.4%)",
  "issues":[

      "캠퍼스타운 연계 청년창업 특화대출·적금":"경희대·서울시립대·한국외대를 대상으로 2020.1~2025.12 추진된 캠퍼스타운 조성사업에서, 서울시립대 캠퍼스타운은 41개 기업 참여·20억원 매출이라는 성과가 확인됐습니다. 은행은 이 입주기업을 대상으로 담보를 완화한 창업자금대출을 제공하고, 참여 대학생·청년에게는 창업 시 대출 한도·금리를 연계하는 청년창업 목적적금을 제공합니다.",
      "역세권 청년주택 창업공간 연계 청년사업자 금융":"휘경동 281-1 일대에 조성된 역세권 청년주택 내 청년 창업공간(2~3인실 5개, 4인실 5개)은 plan FN-3에서도 청년 인턴 배치 공간으로 활용이 제안된 곳입니다. 은행은 이 공간 입주팀을 대상으로 사업자통장 무료 제공, 초기 소액 마이크로크레딧, 창업 3년차까지 단계별 한도 확대형 대출을 묶은 패키지를 제공합니다.",
      "청년 취·창업 프로그램 연계 인턴십 급여계좌·장학연계상품":"동대문구는 '청년 취업 해Dream', '청년 취·창업 아카데미' 등 역량강화 프로그램과, 자격시험 응시료·교재비를 지원하는 사업을 운영 중이며, plan FN-3 '청년 디지털 행정서포터즈'도 이 사업군의 확장으로 제안됐습니다. 은행은 아카데미 수료생과 서포터즈 참여 청년을 대상으로 구청 지원금과 매칭 시 우대금리를 주는 청년 자기계발 목적적금을 제공합니다.",
      "마스터DB·아카이빙 구축(plan IT-1) 은행 노하우 결합 참여":"동대문구는 2024~2026년판 주요업무계획 실물 PDF가 게시되지 않아 122개 사업 확인율이 52%에 그친 문제가 있습니다. plan IT-1(추정예산 350~500백만원) 마스터DB 구축 사업에 은행이 문서 전자화·장기보존 노하우를 컨설팅 형태로 제공하고 구축비 일부를 지역사회공헌 성격으로 분담하는 대신, 구청 사업 데이터를 API로 공급받아 상생금융 대상 사업 발굴 자료로 활용합니다.",
      "통합 검색 플랫폼(plan IT-2) 내 '금융지원 정보' 카테고리 공동 구축":"동대문구 122개 사업의 확인율은 대형사업 83%, 생활밀착형 사업 33~40%로 격차가 커, plan IT-2(추정예산 400~550백만원) 통합 사업정보·예산 검색 플랫폼이 제안됐습니다. 은행은 이 플랫폼 안에 답십리 재개발 이주비대출, 캠퍼스타운 창업대출 등 '구청 사업 연계 금융지원 상품' 카테고리를 구청과 공동 기획·입력하는 형태로 참여합니다.",
      "민원 대시보드(plan IT-3) 연계 금융취약계층 조기 발굴":"'구청장에게 바란다' 상위 10건 중 8건이 신답극동아파트 리모델링조합 관련 민원에 집중된 가운데, plan IT-3 민원 채널 통합 대시보드와 IT-4 노후공동주택 안전이슈 조기경보 시스템이 제안됐습니다. 이 경보 로직이 특정 단지에 민원이 집중되는 것을 포착하면, 은행이 해당 단지 조합에 리모델링 사업비대출 상담 채널을 옵트인 방식으로 연계 제안할 수 있습니다.",
      "신답극동아파트 등 리모델링조합 이주비·사업비대출":"'구청장에게 바란다' 상위 10건 중 8건이 신답극동아파트 리모델링조합의 소방차 통행확보, 보수·보강 행정명령, 안전진단 촉구 등 민원에 집중됐습니다. 기존 소규모 노후건축물 지원은 아파트·연립을 제외해 사각지대에 있었고, 이를 보완하는 plan FN-1 매칭지원금(400~600백만원)이 제안됐습니다. 은행은 자부담분에 대한 조합원 개별대출 또는 조합 명의 사업비대출을 연계합니다.",

      "사회안전망 취약계층 연계 소액금융":"동대문구는 저소득 어르신 급식 지원(860명), 노인 일자리 활성화(2,341명) 등 취약계층 대상 사업을 다수 운영하며, 서울형 유급 병가 지원(연 최대 14일)도 시행 중입니다. 은행은 노인일자리사업 참여자를 대상으로 취업연계형 급여수령계좌와 소액 긴급생활안정자금 대출을 제공하고, 유급병가 지원금 수령 대기기간을 메우는 브릿지 소액대출도 제공할 수 있습니다.",

function pathCentroid(d) {
  const nums = (d.match(/-?\d+(\.\d+)?/g) || []).map(Number);
  const pts = [];
  for (let i = 0; i < nums.length; i += 2) pts.push([nums[i], nums[i+1]]);
  const pairs = [];
  for (let i = 0; i < pts.length; i++) pairs.push([pts[i], pts[(i+1) % pts.length]]);
  let area = 0, cx = 0, cy = 0;
  pairs.forEach(([[x0,y0],[x1,y1]]) => {
    const cross = x0*y1 - x1*y0;
    area += cross;
    cx += (x0+x1)*cross;
    cy += (y0+y1)*cross;
  });
  area /= 2;
  if (Math.abs(area) < 1e-6) {
    const ax = pts.reduce((s,p)=>s+p[0],0)/pts.length, ay = pts.reduce((s,p)=>s+p[1],0)/pts.length;
    return [ax, ay];
  }
  return [cx/(6*area), cy/(6*area)];
}

function renderMap() {
  const svgParts = [];
  svgParts.push('<svg id="seoul-map" viewBox="0 0 800 620" style="width:100%;height:100%;display:block;">');

  Object.entries(MAP_PATHS).forEach(([id, path]) => {
    const d = DISTRICTS[id];
    const bank = bankOf(id);
    const cls = d.active ? 'gu gu-active' : 'gu placeholder';
    svgParts.push(`<path class="${cls}" data-id="${id}" style="fill:${bank.color}" d="${path}" onclick="openDistrict('${id}', event)" onmouseenter="showMapTooltip('${id}', event)" onmousemove="moveMapTooltip(event)" onmouseleave="hideMapTooltip()"></path>`);
  });

  Object.entries(MAP_PATHS).forEach(([id, path]) => {
    const d = DISTRICTS[id];
    const [cx, cy] = pathCentroid(path);
    if (!d.active) {
      svgParts.push(`<text x="${cx}" y="${cy}" class="d-label-sm" text-anchor="middle" pointer-events="none">${d.name}</text>`);
      return;
    }
    const c = scoreColor(d.score);
    svgParts.push(`<g transform="rotate(-6 ${cx} ${cy+18})">
      <circle cx="${cx}" cy="${cy+18}" r="16" fill="var(--dossier)"></circle>
      <circle class="d-seal" cx="${cx}" cy="${cy+18}" r="15" fill="${c}" fill-opacity="0.14" stroke="${c}"></circle>
      <text x="${cx}" y="${cy+22}" text-anchor="middle" class="d-seal-score" fill="${c}">${d.score}</text>
    </g>`);
    svgParts.push(`<text x="${cx}" y="${cy}" class="d-label" text-anchor="middle">${d.name}</text>`);
  });

  svgParts.push('<text x="400" y="605" text-anchor="middle" id="map-footnote">진하게 표시된 5개구 = 이번 프로젝트 대상 · 마우스를 올려 정보 확인, 클릭하면 상세보기</text>');

}

function showMapTooltip(id, evt) {
  const d = DISTRICTS[id];
  const bank = bankOf(id);
  const tip = document.getElementById('map-tooltip');
  if (d.active) {
    tip.innerHTML = `
      <div class="mt-head">
        <span class="seal-badge mt-seal" style="color:${scoreColor(d.score)}">${d.score}<span class="sb-label">점수</span></span>

      </div>
      <div class="mt-budget">제안 총예산 ${d.budget}</div>
      <div class="mt-issue">${d.issues[0]}</div>
      <div class="mt-cta">클릭하면 전체 검증 리포트 보기 →</div>
    `;
  } else {
    tip.innerHTML = `
      <div class="mt-head"><div class="mt-name">${d.name}</div></div>
      <div class="mt-bank" style="color:${bank.color}">● ${bank.name} 구금고</div>
      <div class="mt-cta">이번 프로젝트 대상 아님</div>
    `;
  }
  tip.classList.add('show');
  moveMapTooltip(evt);
}
function moveMapTooltip(evt) {
  const tip = document.getElementById('map-tooltip');
  if (!tip.classList.contains('show')) return;
  const pad = 18;
  let x = evt.clientX + pad, y = evt.clientY + pad;
  if (x + 280 > window.innerWidth) x = evt.clientX - 280 - pad;
  if (y + 180 > window.innerHeight) y = evt.clientY - 180 - pad;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}
function hideMapTooltip() {
  document.getElementById('map-tooltip').classList.remove('show');
}

function openDistrict(id, evt) {

    return;
  }
  hideMapTooltip();
  showDistrictDetail(id, evt);
}

function truncateLabel(text, n) {
  return text.length > n ? text.slice(0, n).trim() + '…' : text;
}

function pct(part, total) {
  return total ? Math.round(part / total * 100) : 0;
}

function renderCorrelationGraph(links) {
  if (!links || !links.length) {
    return `<div class="corr-empty">이 구는 사업계획과 민원게시판을 직접 연결할 근거를 찾지 못했습니다. 아래 상관관계 요약을 참고하세요.</div>`;
  }
  const planNodes = [...new Set(links.map(l => l.plan))];
  const compNodes = [...new Set(links.map(l => l.complaint))];
  const rowH = 60, boxW = 320, pad = 30;
  const h = Math.max(planNodes.length, compNodes.length) * rowH + pad;
  const leftX = 10, rightX = 860 - boxW - 10;
  const planY = {}; planNodes.forEach((p,i) => planY[p] = pad + i*rowH);
  const compY = {}; compNodes.forEach((c,i) => compY[c] = pad + i*rowH);
  const edges = links.map(l => `<line x1="${leftX+boxW}" y1="${planY[l.plan]}" x2="${rightX}" y2="${compY[l.complaint]}" stroke="var(--brass)" stroke-width="1.5" stroke-opacity=".5"></line>`).join('');
  const leftNodes = planNodes.map((p,i) => `
    <g>
      ${i===0 ? `<text x="${leftX}" y="${pad-14}" class="corr-node-label">구청 계획사업</text>` : ''}
      <rect x="${leftX}" y="${planY[p]-18}" width="${boxW}" height="36" rx="6" fill="var(--panel)" stroke="var(--border)"></rect>
      <text x="${leftX+12}" y="${planY[p]+4}" font-size="11" fill="var(--text)">${truncateLabel(p,40)}</text>
    </g>`).join('');
  const rightNodes = compNodes.map((c,i) => `
    <g>
      ${i===0 ? `<text x="${rightX}" y="${pad-14}" class="corr-node-label">민원 유형</text>` : ''}
      <rect x="${rightX}" y="${compY[c]-18}" width="${boxW}" height="36" rx="6" fill="var(--brass-soft)" stroke="var(--brass)"></rect>
      <text x="${rightX+12}" y="${compY[c]+4}" font-size="11" fill="var(--text)">${truncateLabel(c,40)}</text>
    </g>`).join('');
  return `<div class="corr-graph"><svg viewBox="0 0 860 ${h}" style="width:100%;height:auto;display:block;">${edges}${leftNodes}${rightNodes}</svg></div>`;
}

      <thead><tr><th>분류</th><th>표본</th><th>확인됨</th><th>부분확인</th><th>확인안됨</th></tr></thead>
      <tbody>${s.byChapter.map(c => `<tr><td>${c.name}</td><td>${c.sampled}</td><td>${c.confirmed}</td><td>${c.partial}</td><td>${c.unconfirmed}</td></tr>`).join('')}</tbody>
    </table>` : `<div class="plan-section-sub">장(챕터)별 표본조사 세부 결과는 원문에 없어 전체 집계만 제공됩니다.</div>`;
  const unconfirmedChips = (s.unconfirmedList && s.unconfirmedList.length) ? `
    <div class="issue-list" style="margin-top:10px;">${s.unconfirmedList.map(u => `<div class="topic-chip">${u}</div>`).join('')}</div>` : '';
  const complaintRows = ps.complaints.channels.map(c => `<tr><td>${c.name}</td><td>${c.visibility}</td><td>${c.posts2026}</td><td>${c.status}</td></tr>`).join('');
  const topPatterns = ps.complaints.topPatterns.map(p => `<li>${p}</li>`).join('');
  return `
    <div class="plan-section-h">사업 이행현황 (표본조사)</div>
    ${statTiles}
    <div class="plan-section-h">사업 성격분류(장)별 계획사업 수</div>
    <table class="vtable">
      <thead><tr><th>분류(장)</th><th>계획사업 수</th><th>예산</th></tr></thead>
      <tbody>${chapterRows}</tbody>
    </table>
    <div class="plan-section-h" style="margin-top:20px;">표본조사 장별 확인 결과</div>
    ${byChapterBlock}
    <div class="plan-section-h" style="margin-top:20px;">확인안됨 사업 목록</div>
    ${unconfirmedChips}
    <div class="plan-section-h">민원게시판 현황</div>
    <table class="vtable">
      <thead><tr><th>채널</th><th>공개여부</th><th>2026년 게시글</th><th>처리상태</th></tr></thead>
      <tbody>${complaintRows}</tbody>
    </table>
    <div class="plan-section-h" style="margin-top:20px;">2026년 민원 유형 상위 패턴</div>
    <ul style="margin:0; padding-left:20px; font-size:13px; line-height:1.9;">${topPatterns}</ul>
    <div class="stat-caption">출처: ${ps.complaints.source}</div>
    <div class="plan-section-h">사업계획 ↔ 민원 상관관계</div>
    ${renderCorrelationGraph(ps.correlation.links)}
    ${ps.correlation.links && ps.correlation.links.length ? `
    <table class="corr-table">
      <thead><tr><th>구청 계획사업</th><th>민원 유형</th><th>연결 근거</th></tr></thead>
      <tbody>${ps.correlation.links.map(l => `<tr><td>${l.plan}</td><td>${l.complaint}</td><td>${l.note}</td></tr>`).join('')}</tbody>
    </table>` : ''}
    <div class="verdict-note" style="margin-top:16px;">
      <div class="vn-label">상관관계 요약</div>
      <p>${ps.correlation.summary}</p>
    </div>
  `;
}

function switchDetailTab(sub) {
  document.querySelectorAll('.detail-subtab').forEach(t => t.classList.toggle('active', t.dataset.sub===sub));
  const d = DISTRICTS[currentDistrictId];
  const body = document.getElementById('detail-body');

  if (sub === 'summary') {
    body.innerHTML = renderPlanStatus(d);
  } else if (sub === 'it' || sub === 'fn') {
    const isIt = sub === 'it';
    const projects = isIt ? d.itProjects : d.fnProjects;
    const detailMap = isIt ? d.itDetail : d.fnDetail;
    const prefix = isIt ? '전산화지원사업' : '금융지원사업';
    const vRows = d.validation.filter(v => v.code.startsWith(prefix));
    const projCard = p => {
      const val = d.validation.find(v => v.code === p.code);
      const overlapLabel = val ? val.overlap.split('(')[0].trim() : '';
      const detail = detailMap && detailMap[p.code];
      return `
      <details class="proj-card">
        <summary>
          <div class="code">${p.code}</div>
          <div class="name">${p.name}</div>
          <div class="meta">${overlapLabel ? `<span class="pill" data-level="${overlapLabel}">${overlapLabel}</span>` : ''}<span class="pill" data-level="${p.priority}">${p.priority}</span><span>${p.budget}</span><span>근거: ${p.basis}</span></div>
        </summary>
        ${detail ? `<div class="proj-detail">${detail}</div>` : ''}
      </details>`;
    };
    const vRow = v => {
      const label = v.overlap.split('(')[0].trim();
      return `
      <tr>
        <td>${v.code}</td>
        <td><span class="pill" data-level="${label}">${label}</span><div class="vtable-sub">${v.overlap}</div></td>
        <td><span class="pill" data-level="${v.grade}">${v.grade}</span></td>
        <td>${v.rationale}</td><td>${v.recommendation}</td>
      </tr>`;
    };
    body.innerHTML = `
      ${PROPOSAL_BANNER}
      <h3 class="section-h">${isIt ? '전산개발 신규 제안' : '자금지원 신규 제안'} — 구청 계획과의 관계 (클릭하면 원본 근거 상세 보기)</h3>
      ${projects.map(projCard).join('')}
      <h3 class="section-h accent">타당성 검증표</h3>
      <table class="vtable">
        <thead><tr><th>코드</th><th>중복여부</th><th>등급</th><th>판단근거</th><th>수정권고</th></tr></thead>
        <tbody>${vRows.map(vRow).join('')}</tbody>
      </table>
    `;
  } else if (sub === 'bank') {
    const top3Set = new Set(d.bankIdeas.top3);
    const details = d.bankIdeas.details || {};
    const cats = Object.entries(d.bankIdeas.categories)
      .map(([cat, items]) => `
        <div class="bank-cat">
          <h4>${cat}</h4>
          <ul>${items.map(i => `
            <li><details class="bank-idea ${top3Set.has(i) ? 'is-top3' : ''}">
              <summary>${top3Set.has(i) ? '<span class="li-star">★</span>' : ''}${i}</summary>
              ${details[i] ? `<div class="bank-detail">${details[i]}</div>` : ''}
            </details></li>`).join('')}</ul>
        </div>`).join('');
    body.innerHTML = `
      ${PROPOSAL_BANNER}
      <div class="top3-box">
        <div class="top3-box-label">선정 TOP3 · 아래 카테고리별 아이디어 중 우선순위가 가장 높은 3건 (클릭하면 상세)</div>
        ${d.bankIdeas.top3.map((t,i) => `<div class="top3-item"><span class="top3-rank">${i+1}</span>${t}</div>`).join('')}
      </div>
      ${cats}
    `;
  }
}

const REPORT_TOPICS = {
  it: {
    label: '전산개발 신규 제안',
    render: d => d.itProjects.map(p => `<div class="report-proj-line"><b>${p.name}</b><br><span class="pill" data-level="${p.priority}">${p.priority}</span> ${p.budget}</div>`).join('')
  },
  fn: {
    label: '자금지원 신규 제안',
    render: d => d.fnProjects.map(p => `<div class="report-proj-line"><b>${p.name}</b><br><span class="pill" data-level="${p.priority}">${p.priority}</span> ${p.budget}</div>`).join('')
  },
  score: {
    label: '검증 신뢰도 점수',
    render: d => `<span class="seal-badge" style="color:${scoreColor(d.score)}">${d.score}<span class="sb-label">점수</span></span><div style="margin-top:12px; font-size:12px; line-height:1.6; opacity:.85;">${d.verdictBasis}</div>`
  },
  bank: {
    label: '금융업 연계 신규 제안',
    render: d => `<div>카테고리 ${Object.keys(d.bankIdeas.categories).length}개</div><div style="margin-top:8px;">${d.bankIdeas.top3.map(t => '· '+t).join('<br>')}</div>`
  }
};

function renderReportTab() {
  const activeIds = Object.keys(DISTRICTS).filter(id => DISTRICTS[id].active);
  const container = document.getElementById('tab-report');
  container.innerHTML = `
    <div id="report-container">
      <label style="font-size:13px; opacity:.7;">주제 선택:
        <select id="topic-select" onchange="renderTopicGrid()">
          ${Object.entries(REPORT_TOPICS).map(([k,t]) => `<option value="${k}">${t.label}</option>`).join('')}
        </select>
      </label>
      <div id="topic-grid"></div>
    </div>
  `;
  renderTopicGrid();

  function renderTopicGrid() {
    const topic = REPORT_TOPICS[document.getElementById('topic-select').value];
    document.getElementById('topic-grid').innerHTML = activeIds.map(id => {
      const d = DISTRICTS[id];
      return `<div class="report-col"><h4>${d.name}</h4>${topic.render(d)}</div>`;
    }).join('');
  }
  window.renderTopicGrid = renderTopicGrid;
}
</script>
</body>
</html>
